app:
  description: 决赛版 v2.0 - Chatflow 版。修复了 checkValid 校验报错，补全了模型及工具链元数据。
  icon: ''
  icon_background: '#D1E9FF'
  mode: advanced-chat
  name: 大模型5月12日-v2.0-Chatflow
  use_icon_as_answer_icon: false
kind: app
version: 0.4.0
workflow:
  conversation_variables:
  - description: 宾客姓名
    id: guest_name
    name: guest_name
    selector:
    - conversation
    - guest_name
    value: ''
    value_type: string
  - description: 入住日期
    id: checkin_date
    name: checkin_date
    selector:
    - conversation
    - checkin_date
    value: ''
    value_type: string
  environment_variables: []
  features:
    opening_statement: 您好！我是新会碧桂园凤凰酒店的智能管家。我已为您准备好知识库问答与实时预订服务。请问您需要预订房间、门票，还是了解酒店设施？
    retriever_resource:
      enabled: true
    suggested_questions:
    - 预订周六的客房
    - 购买景区门票
    - 酒店有免费停车场吗？
  graph:
    edges:
    - data:
        sourceType: start
        targetType: question-classifier
      id: '1715530000001'
      source: '1715530000000'
      target: '1715530000002'
    - data:
        sourceType: question-classifier
        targetType: knowledge-retrieval
      id: '1715530000003'
      source: '1715530000002'
      source_handle: faq_branch
      target: '1715530000004'
    - data:
        sourceType: question-classifier
        targetType: agent-node
      id: '1715530000005'
      source: '1715530000002'
      source_handle: hotel_branch
      target: '1715530000006'
    - data:
        sourceType: question-classifier
        targetType: agent-node
      id: '1715530000007'
      source: '1715530000002'
      source_handle: ticket_branch
      target: '1715530000008'
    nodes:
    - data:
        title: 开始
        type: start
        variables: []
      id: '1715530000000'
      position:
        x: 50
        y: 300
      type: custom
    - data:
        model:
          mode: chat
          name: deepseek-v3
          provider: langgenius/tongyi/tongyi
        title: 意图分类器
        type: question-classifier
        classes:
        - id: faq_branch
          name: 酒店百科咨询 (设施/餐饮/交通/投诉)
        - id: hotel_branch
          name: 酒店客房预订 (查房/订房/房型详情)
        - id: ticket_branch
          name: 景区票务预订 (查票/买票/景点详情)
      id: '1715530000002'
      position:
        x: 250
        y: 300
      type: custom
    - data:
        dataset_ids: []
        title: 知识库检索
        type: knowledge-retrieval
      id: '1715530000004'
      position:
        x: 500
        y: 100
      type: custom
    - data:
        agent_mode: function_calling
        model:
          mode: chat
          name: deepseek-v3
          provider: langgenius/tongyi/tongyi
        prompt_template:
        - id: system-instruction
          role: system
          text: "你是酒店预订专家。请严格执行【酒店订房 SOP】。当前仅处理订房相关事务。电话：0750-662-9888。严禁输出英文和思考过程。"
        title: 酒店交易 Agent
        tools:
        - provider_id: hotel
          provider_name: 酒店客房预订
          provider_type: builtin
          tool_name: getAvailableRoomsByDate
        - provider_id: hotel
          provider_name: 酒店客房预订
          provider_type: builtin
          tool_name: getAvailableRoomsByRoomTypeAndDate
        - provider_id: hotel
          provider_name: 酒店客房预订
          provider_type: builtin
          tool_name: getRoomDetailByRoomCode
        - provider_id: hotel
          provider_name: 酒店客房预订
          provider_type: builtin
          tool_name: submitBooking
        type: agent-node
      id: '1715530000006'
      position:
        x: 500
        y: 300
      type: custom
    - data:
        agent_mode: function_calling
        model:
          mode: chat
          name: deepseek-v3
          provider: langgenius/tongyi/tongyi
        prompt_template:
        - id: system-instruction
          role: system
          text: "你是票务专家。请严格执行【景区票务 SOP】。当前仅处理票务事务。电话：0750-662-9888。严禁输出英文和思考过程。"
        title: 票务交易 Agent
        tools:
        - provider_id: attractions
          provider_name: 景区票务预订
          provider_type: builtin
          tool_name: submitPurchase
        - provider_id: attractions
          provider_name: 景区票务预订
          provider_type: builtin
          tool_name: getTravelMerchandiseViews4Ticket
        - provider_id: attractions
          provider_name: 景区票务预订
          provider_type: builtin
          tool_name: getTravelMerchandiseViewById
        type: agent-node
      id: '1715530000008'
      position:
        x: 500
        y: 500
      type: custom
    - data:
        answer: '{{#1715530000004.text#}}{{#1715530000006.text#}}{{#1715530000008.text#}}'
        title: 回复
        type: answer
      id: '1715530000010'
      position:
        x: 800
        y: 300
      type: custom
